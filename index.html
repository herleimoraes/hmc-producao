<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMC Controle de Produção</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar fixed-top bg-primary shadow-sm" data-bs-theme="dark">
        <div class="container-fluid d-flex justify-content-center align-items-center position-relative">
            <a class="navbar-brand mb-0 h1 fw-bold fs-5 text-center d-flex align-items-center" href="#">
                <i class="fa-solid fa-industry me-2"></i> HMC Produção
            </a>
            <button class="btn btn-link text-white position-absolute end-0 me-2 p-0 text-decoration-none">
                <i class="fa-regular fa-bell fs-5"></i>
            </button>
        </div>
    </nav>

    <main class="container content-area pt-5 pb-5 mt-4 mb-4">
        
        <div class="row g-3 mt-2">
            <div class="col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body text-center p-3">
                        <i class="fa-solid fa-clipboard-list fa-2x text-primary mb-2"></i>
                        <h6 class="card-title mb-0 fw-bold">Ordens</h6>
                        <small class="text-muted">12 ativas</small>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body text-center p-3">
                        <i class="fa-solid fa-check-double fa-2x text-success mb-2"></i>
                        <h6 class="card-title mb-0 fw-bold">Concluídas</h6>
                        <small class="text-muted">45 hoje</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <h5 class="fw-bold mb-3 text-secondary fs-6">Ações Rápidas</h5>
            <div class="list-group shadow-sm rounded-4 border-0">
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center p-3 border-0 border-bottom">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-2 me-3">
                        <i class="fa-solid fa-plus fa-fw"></i>
                    </div>
                    <span class="fw-semibold">Nova Ordem de Produção</span>
                    <i class="fa-solid fa-chevron-right ms-auto text-muted small"></i>
                </a>
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center p-3 border-0">
                    <div class="bg-info bg-opacity-10 text-info rounded-circle p-2 me-3">
                        <i class="fa-solid fa-boxes-stacked fa-fw"></i>
                    </div>
                    <span class="fw-semibold">Consultar Estoque</span>
                    <i class="fa-solid fa-chevron-right ms-auto text-muted small"></i>
                </a>
            </div>
        </div>
    </main>

    <nav class="bottom-nav fixed-bottom bg-white border-top shadow-lg">
        <div class="d-flex justify-content-around align-items-center h-100">
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-house nav-icon"></i>
                <span class="nav-label">Início</span>
            </a>
            
            <a href="#" class="nav-item">
                <i class="fa-solid fa-clipboard-check nav-icon"></i>
                <span class="nav-label">Produção</span>
            </a>
            
            <a href="#" class="nav-item nav-item-action">
                <div class="action-btn bg-primary text-white shadow">
                    <i class="fa-solid fa-plus fs-4"></i>
                </div>
                <span class="nav-label mt-1">Novo</span>
            </a>
            
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chart-pie nav-icon"></i>
                <span class="nav-label">Painel</span>
            </a>
            
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear nav-icon"></i>
                <span class="nav-label">Ajustes</span>
            </a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
