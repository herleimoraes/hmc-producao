<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração Google Sheets</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
        #mensagem { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Enviar dados para a Planilha</h2>
    
    <form id="meuFormulario">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit" id="btnEnviar">Salvar na Planilha</button>
    </form>

    <div id="mensagem"></div>

    <script>
        // Captura o formulário
        const formulario = document.getElementById('meuFormulario');
        const divMensagem = document.getElementById('mensagem');
        const btnEnviar = document.getElementById('btnEnviar');

        // URL do seu Backend (Pode ser um arquivo PHP, Python, ou a URL do Apps Script)
        const URL_BACKEND = 'https://script.google.com/macros/s/AKfycbweeQEbjMJsWXhcRJ0yI-wsMCMOU8Q3JlqJ1yFrWRFDGJzcQLehSrAHip09FzL_G2ah/exec'; 

        formulario.addEventListener('submit', async function(event) {
            event.preventDefault(); // Evita que a página recarregue

            // Pega os valores dos inputs
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value
            };

            // Muda o status do botão
            btnEnviar.innerText = 'Enviando...';
            btnEnviar.disabled = true;
            divMensagem.innerText = '';

            try {
                // Faz a requisição POST para o seu backend
                const resposta = await fetch(URL_BACKEND, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(dados)
                });

                const resultado = await resposta.json();

                if (resposta.ok) {
                    divMensagem.style.color = 'green';
                    divMensagem.innerText = 'Dados salvos com sucesso na planilha!';
                    formulario.reset(); // Limpa o form
                } else {
                    throw new Error(resultado.erro || 'Erro desconhecido');
                }

            } catch (erro) {
                console.error('Erro:', erro);
                divMensagem.style.color = 'red';
                divMensagem.innerText = 'Erro ao enviar: ' + erro.message;
            } finally {
                // Restaura o botão
                btnEnviar.innerText = 'Salvar na Planilha';
                btnEnviar.disabled = false;
            }
        });
    </script>
</body>
</html>
